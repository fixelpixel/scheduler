services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_DB: collection_scheduler
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d collection_scheduler"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: scheduler-app
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.deploy
    environment:
      - SCOPES=read_products,write_products,read_publications,write_publications
    networks:
      - default
      - gateway
    ports:
      - "${APP_BIND_HOST:-0.0.0.0}:${APP_PORT:-3001}:3000"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

networks:
  default:
  gateway:
    name: shipdip-client-handoff-20260420-164604_default
    external: true

volumes:
  postgres_data:
