api_version = "2026-04"

[[extensions]]
name = "Checkout schedule"
handle = "checkout-schedule"
type = "ui_extension"

[[extensions.targeting]]
target = "purchase.checkout.block.render"
module = "./src/index.tsx"
export = "default"

[extensions.capabilities]
network_access = true

[extensions.settings]
[[extensions.settings.fields]]
key = "app_url"
type = "single_line_text_field"
name = "App URL"
description = "Public app URL used by the checkout block to fetch schedule notices. Required for Shopify Plus checkout extensibility."

[[extensions.settings.fields]]
key = "shop_domain"
type = "single_line_text_field"
name = "Shop domain"
description = "Optional .myshopify.com domain fallback if checkout context does not expose the shop domain. Do not enter secrets."
